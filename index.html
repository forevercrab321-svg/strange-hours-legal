<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strange Hours — Legal</title>
<style>
  :root{--ground:#f4f5f6;--ink:#1b1e24;--muted:#5b616a;--accent:#b5762f;--rule:#e2e4e7}
  *{box-sizing:border-box}
  body{background:var(--ground);color:var(--ink);margin:0;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.62;-webkit-font-smoothing:antialiased}
  .wrap{max-width:60ch;margin:0 auto;padding:72px 24px 96px}
  .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin:0 0 10px}
  h1{font-family:Georgia,"Iowan Old Style",serif;font-weight:600;
    font-size:2.1rem;line-height:1.2;margin:0 0 10px;letter-spacing:-.01em}
  p{font-size:1.05rem;color:#2c313a}
  ul{list-style:none;padding:0;margin:2em 0 0}
  li{margin:.6em 0}
  a{color:var(--accent);text-underline-offset:2px;font-size:1.08rem}
  footer{margin-top:3.5em;padding-top:20px;border-top:1px solid var(--rule);
    color:var(--muted);font-size:.9rem}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Strange Hours</p>
  <h1>Legal &amp; Policies</h1>
  <p>Strange Hours is an automated folklore-horror storytelling channel. These
  documents cover our TikTok publishing integration.</p>
  <ul>
    <li><a href="./privacy.html">Privacy Policy →</a></li>
    <li><a href="./terms.html">Terms of Service →</a></li>
  </ul>
  <footer>Strange Hours · folklore horror, told after dark.</footer>
</div>
</body>
</html>
